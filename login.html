<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册与登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            z-index: -1;
        }

        /* 核心修改：增加注册卡片透明度 */
        .auth-card {
            background-color: rgba(255, 255, 255, 0.8); /* 0.8为透明度，可调整（0-1之间） */
            width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            position: relative;
            /* 可选：增加轻微边框，提升卡片质感 */
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .auth-title {
            text-align: center;
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 14px;
            font-weight: 500;
        }

        /* 输入框也增加轻微透明度，保持整体风格统一 */
        .form-control {
            width: 100%;
            height: 46px;
            padding: 0 15px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.9);
        }
        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .gender-group {
            display: flex;
            align-items: center;
            padding: 10px 0;
        }
        .gender-item {
            display: flex;
            align-items: center;
            margin-right: 25px;
        }
        .gender-item input {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .gender-item label {
            margin: 0;
            cursor: pointer;
        }

        .error-tip {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .auth-btn {
            width: 100%;
            height: 48px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
            font-weight: 500;
        }
        .auth-btn:hover {
            background-color: #2980b9;
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }
        .switch-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .switch-link a:hover {
            text-decoration: underline;
        }

        .user-info {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #95a5a6;
            padding: 0 15px;
        }

        /* 登录弹窗也同步调整透明度，保持风格统一 */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.8); /* 与注册卡片透明度一致 */
            width: 400px;
            padding: 30px;
            border-radius: 10px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
        .close-modal {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        .modal-title {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<!-- 注册页面 -->
<div class="auth-card" id="registerCard">
    <h2 class="auth-title">用户注册</h2>
    <form id="registerForm">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" class="form-control" id="regUsername" placeholder="3-16位字母数字下划线">
            <div class="error-tip" id="regUsernameError">用户名格式不正确</div>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-control" id="regPassword" placeholder="6-18位">
            <div class="error-tip" id="regPasswordError">密码格式不正确</div>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" class="form-control" id="regConfirmPwd">
            <div class="error-tip" id="regConfirmPwdError">两次密码不一致</div>
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" class="form-control" id="regEmail" placeholder="请输入邮箱">
            <div class="error-tip" id="regEmailError">邮箱格式不正确</div>
        </div>
        <div class="form-group">
            <label>性别</label>
            <div class="gender-group">
                <div class="gender-item">
                    <input type="radio" name="gender" value="男" checked>
                    <label>男</label>
                </div>
                <div class="gender-item">
                    <input type="radio" name="gender" value="女">
                    <label>女</label>
                </div>
                <div class="gender-item">
                    <input type="radio" name="gender" value="其他">
                    <label>其他</label>
                </div>
            </div>
        </div>
        <button type="button" class="auth-btn" onclick="submitRegister()">完成注册</button>
    </form>
    <div class="switch-link">
        已有账号？<a onclick="showLoginModal()">立即登录</a>
    </div>
    <div class="user-info">学号：230162402025 | 姓名：刘蔚</div>
</div>

<!-- 登录弹窗 -->
<div class="login-modal" id="loginModal">
    <div class="modal-content">
        <span class="close-modal" onclick="hideLoginModal()">&times;</span>
        <h3 class="modal-title">用户登录</h3>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" class="form-control" id="loginUser">
                <div class="error-tip" id="errUser">用户名不能为空</div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" class="form-control" id="loginPwd">
                <div class="error-tip" id="errPwd">密码不能为空</div>
            </div>
            <button type="button" class="auth-btn" onclick="doLogin()">登录</button>
        </form>
        <div class="user-info" style="position:relative; margin-top:20px;">学号：230162402025 | 姓名：刘蔚</div>
    </div>
</div>

<script>
// 显示登录弹窗
function showLoginModal() {
    document.getElementById("loginModal").style.display = "flex";
}

// 关闭登录弹窗
function hideLoginModal() {
    document.getElementById("loginModal").style.display = "none";
}

// 注册提交
function submitRegister() {
    let username = document.getElementById("regUsername").value.trim();
    let pwd = document.getElementById("regPassword").value.trim();
    let cpwd = document.getElementById("regConfirmPwd").value.trim();
    let email = document.getElementById("regEmail").value.trim();

    let ok = true;

    if (!/^[a-zA-Z0-9_]{3,16}$/.test(username)) {
        document.getElementById("regUsernameError").style.display = "block";
        ok = false;
    } else {
        document.getElementById("regUsernameError").style.display = "none";
    }

    if (pwd.length < 6 || pwd.length > 18) {
        document.getElementById("regPasswordError").style.display = "block";
        ok = false;
    } else {
        document.getElementById("regPasswordError").style.display = "none";
    }

    if (pwd !== cpwd) {
        document.getElementById("regConfirmPwdError").style.display = "block";
        ok = false;
    } else {
        document.getElementById("regConfirmPwdError").style.display = "none";
    }

    if (!/^[\w\.-]+@[\w\.-]+\.\w{2,}$/.test(email)) {
        document.getElementById("regEmailError").style.display = "block";
        ok = false;
    } else {
        document.getElementById("regEmailError").style.display = "none";
    }

    if (ok) {
        alert("注册成功！");
        document.getElementById("registerForm").reset();
        showLoginModal(); // 注册成功 → 自动弹出登录
    }
}

// 登录
function doLogin() {
    let user = document.getElementById("loginUser").value.trim();
    let pwd = document.getElementById("loginPwd").value.trim();
    let ok = true;

    if (!user) {
        document.getElementById("errUser").style.display = "block";
        ok = false;
    } else {
        document.getElementById("errUser").style.display = "none";
    }

    if (!pwd) {
        document.getElementById("errPwd").style.display = "block";
        ok = false;
    } else {
        document.getElementById("errPwd").style.display = "none";
    }

    if (ok) {
        alert("登录成功！");
        hideLoginModal();
    }
}

// 点击空白关闭
window.onclick = function(e) {
    let modal = document.getElementById("loginModal");
    if (e.target === modal) hideLoginModal();
}
</script>

</body>
</html>
